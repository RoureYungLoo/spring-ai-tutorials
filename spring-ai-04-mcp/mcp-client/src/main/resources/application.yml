server:
  port: 8083

spring:
  application:
    name: mcp-client
  ai:
    openai:
      api-key: ${ALIYUN_BAI_LIAN_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-max-latest
    mcp:
      client:
        enabled: true
        name: ${spring.application.name}
        version: 1.0.0
        request-timeout: 30s
        toolcallback:
          enabled: true
        stdio:
          servers-configuration: classpath:mcp-server.json
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.149:3306/spring-ai-ollama?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&tinyInt1isBit=false&allowPublicKeyRetrieval=true&allowMultiQueries=true&useServerPrepStmts=false
    username: root
    password: MySQL123!



logging:
  level:
    com.luruoyang: debug
